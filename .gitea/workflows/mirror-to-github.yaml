name: Mirror to GitHub

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Remove private files
        run: |
          rm -rf docs/plans CLAUDE.md .claude .gitea scripts
          git config user.name "mirror-bot"
          git config user.email "mirror-bot@noreply"
          git add -A
          git commit --amend --no-edit

      - name: Scan for PII
        run: |
          FOUND=0
          for pattern in 'gnerim\.ru' '/Users/gnezim' 'hf_[a-zA-Z0-9]{20,}'; do
            MATCHES=$(grep -rn --include='*.py' --include='*.sh' --include='*.md' --include='*.toml' -E "$pattern" . 2>/dev/null | grep -v '\.git/' || true)
            if [ -n "$MATCHES" ]; then
              echo "::error::PII pattern '$pattern' found:"
              echo "$MATCHES"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then exit 1; fi
          echo "PII scan clean"

      - name: Push to GitHub
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GH_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          git remote add github git@github.com:shared-goals/audio-transcribe.git
          git push github main --force
          git push github --tags --force
